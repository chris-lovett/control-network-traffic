# service-router.yaml
#
# Consul ServiceRouter for the "backend" service.
#
# Use for BLUE/GREEN deployments. Routes all traffic to a specific subset,
# optionally using a header to smoke-test the new version first.
#
# Apply with:
#   consul config write consul/config-entries/service-router.yaml

Kind = "service-router"
Name = "backend"

Routes = [
  # Header-based routing: requests with X-Backend-Version: v2 go to v2.
  # Useful for smoke-testing the green version before full cut-over.
  {
    Match {
      HTTP {
        Header = [
          {
            Name  = "X-Backend-Version"
            Exact = "v2"
          }
        ]
      }
    }
    Destination {
      Service       = "backend"
      ServiceSubset = "v2"
    }
  },
  # Default route: all other traffic goes to v1 (blue).
  # To cut over to v2, change ServiceSubset to "v2".
  {
    Match {
      HTTP {
        PathPrefix = "/"
      }
    }
    Destination {
      Service       = "backend"
      ServiceSubset = "v1"
    }
  }
]

