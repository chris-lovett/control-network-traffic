# proxy-defaults.yaml
#
# Consul ProxyDefaults (global) - applies to ALL Envoy sidecars in the mesh.
#
# Key settings:
#   - MeshGateway: controls cross-datacenter traffic handling.
#   - Config.protocol: set to "http" so L7 features (routing, splitting) work.
#
# Apply with:
#   consul config write consul/config-entries/proxy-defaults.yaml

Kind = "proxy-defaults"
Name = "global"

Config {
  # HTTP protocol enables L7 traffic management: splitters, routers, circuit-breaking.
  protocol = "http"
}

MeshGateway {
  Mode = "none"   # Change to "local" or "remote" for multi-DC setups
}

#       MaxEjectionPercent: 100        # allow ejecting all hosts
#       BaseEjectionTime: "30s"
#
# Apply the above with:
#   consul config write consul/config-entries/service-defaults-backend.yaml
