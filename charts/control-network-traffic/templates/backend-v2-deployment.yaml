{{- if .Values.backendV2.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v2
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Values.backendV2.appVersion | quote }}
    version: {{ .Values.backendV2.appVersion | quote }}
    {{- include "control-network-traffic.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backendV2.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
      version: {{ .Values.backendV2.appVersion | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Values.backendV2.appVersion | quote }}
        version: {{ .Values.backendV2.appVersion | quote }}
        consul.hashicorp.com/connect-inject: "true"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: {{ .Values.backendV2.securityContext.runAsNonRoot }}
      containers:
        - name: backend
          image: "{{ .Values.backendV2.image.repository }}:{{ .Values.backendV2.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backendV2.port }}
              protocol: TCP
          env:
            - name: APP_VERSION
              value: {{ .Values.backendV2.appVersion | quote }}
            - name: PORT
              value: {{ .Values.backendV2.port | quote }}
            - name: FAILURE_RATE
              value: {{ .Values.backendV2.failureRate | quote }}
            - name: DELAY_MS
              value: {{ .Values.backendV2.delayMs | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backendV2.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.backendV2.securityContext.allowPrivilegeEscalation }}
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
{{- end }}
